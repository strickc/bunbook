<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunbook Interactive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.css">
</head>
<body>
    <div class="layout">
        <aside id="sidebar">
            <header>
                <h1>Bun<span>book</span></h1>
            </header>
            <nav id="file-list">
                <!-- Files will be injected here -->
            </nav>
        </aside>
        
        <div class="content">
            <header class="top-bar">
                <div id="current-filename">Select a notebook...</div>
                <div id="status" class="status-indicator">Connected</div>
            </header>
            
            <main id="notebook">
                <p>Please select a <code>.bunbk.md</code> file from the sidebar.</p>
            </main>
        </div>
    </div>
    <!-- Bundled JS entrypoints -->
    <script src="main.js"></script>
</body>
</html>
